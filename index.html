<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOX-LAN Tactical Firebase | Toggle Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'walkie-talkie-pro';
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.vlan = { db, auth, appId, doc, setDoc, onSnapshot, collection, serverTimestamp, deleteDoc };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700&display=swap');
        
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #050505;
            color: #d1d5db;
            overflow: hidden;
            touch-action: none;
            transition: background-color 0.3s ease;
        }

        /* Estado Transmisión Activa */
        body.transmitting {
            background-color: #1a0505;
        }

        .lcd-display {
            background-color: #0a110f;
            border: 2px solid #162a24;
            box-shadow: inset 0 0 30px rgba(0, 255, 150, 0.05);
            position: relative;
            transition: all 0.3s ease;
        }

        body.transmitting .lcd-display {
            border-color: #451a1a;
            background-color: #150a0a;
            box-shadow: inset 0 0 30px rgba(255, 0, 0, 0.1);
        }

        .lcd-display::after {
            content: "";
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }

        .ptt-btn {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            box-shadow: 0 10px 0 #020617, 0 20px 30px rgba(0,0,0,0.7);
            border: 4px solid #334155;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Visual del botón en ON */
        .ptt-btn.on {
            background: linear-gradient(145deg, #7f1d1d, #450a0a);
            border-color: #ef4444;
            box-shadow: 0 4px 0 #2d0a0a, 0 0 40px rgba(239, 68, 68, 0.4);
            transform: translateY(4px);
        }

        .ptt-btn.on svg {
            color: #f87171;
            filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0.6));
        }

        .status-glow { transition: all 0.3s ease; }
        .glow-green { box-shadow: 0 0 15px #10b981; background-color: #10b981; }
        .glow-red { box-shadow: 0 0 15px #ef4444; background-color: #ef4444; }
        .glow-blue { box-shadow: 0 0 20px #3b82f6; background-color: #3b82f6; }
        .glow-orange { box-shadow: 0 0 15px #f59e0b; background-color: #f59e0b; }

        .level-bar { height: 6px; background: #10b981; transition: width 0.05s ease; width: 0%; }
        body.transmitting .level-bar { background: #ef4444; }

        .lamp { width: 8px; height: 8px; border-radius: 50%; background: #1e293b; display: inline-block; margin-right: 4px; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #162a24; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-between p-6 pb-12">

    <!-- Header Status -->
    <div class="w-full max-w-md flex justify-between items-center opacity-80">
        <div class="flex items-center gap-3">
            <div id="status-led" class="w-3 h-3 rounded-full status-glow glow-red"></div>
            <span id="status-text" class="text-[10px] font-bold tracking-[0.2em] uppercase">Iniciando...</span>
        </div>
        <div class="flex gap-4">
            <span id="tx-label" class="text-[9px] font-black text-slate-800 border border-slate-800 px-1 rounded transition-colors">TX</span>
            <span id="rx-label" class="text-[9px] font-black text-slate-800 border border-slate-800 px-1 rounded transition-colors">RX</span>
        </div>
    </div>

    <!-- Main Console -->
    <div class="w-full max-w-md flex flex-col gap-4">
        
        <!-- LCD Display -->
        <div class="lcd-display rounded-xl p-5 border-t-4 border-slate-800">
            <div class="flex justify-between items-start mb-2">
                <div class="text-[10px] text-emerald-500/50 font-bold uppercase tracking-widest" id="lcd-unit-label">Unidad Local</div>
                <div class="text-[10px] text-emerald-500/50 font-bold uppercase tracking-widest" id="clock">00:00:00</div>
            </div>
            
            <div class="flex flex-col items-center justify-center py-1">
                <div id="my-id" class="text-3xl font-bold text-emerald-400 tracking-tighter font-['Orbitron']">----</div>
                <div id="action-msg" class="text-[9px] h-4 text-emerald-600 font-bold uppercase tracking-wider">Esperando Red...</div>
            </div>

            <!-- Vúmetro -->
            <div class="mt-2">
                <div class="flex justify-between text-[7px] text-emerald-900 font-bold uppercase mb-1">
                    <span id="meter-label">Señal de Audio</span>
                    <span id="db-value">-∞ dB</span>
                </div>
                <div class="w-full bg-slate-900/50 rounded overflow-hidden border border-emerald-900/10 p-0.5">
                    <div id="audio-level" class="level-bar shadow-[0_0_10px_#10b981]"></div>
                </div>
            </div>

            <!-- Active Peers Area -->
            <div class="mt-4 border-t border-emerald-900/20 pt-2">
                <span class="text-[8px] text-emerald-700 font-bold uppercase mb-2 block">Directorio de Canal</span>
                <div id="peer-list" class="h-20 overflow-y-auto flex flex-col gap-1 text-[10px]">
                    <span class="opacity-30 italic">Buscando compañeros...</span>
                </div>
            </div>

            <div class="flex justify-between mt-3 px-1">
                <div class="flex items-center">
                    <div id="lamp-mic" class="lamp"></div>
                    <span class="text-[7px] text-emerald-900 font-bold uppercase">Hardware Mic</span>
                </div>
                <div class="flex items-center">
                    <div id="lamp-rx-active" class="lamp"></div>
                    <span class="text-[7px] text-emerald-900 font-bold uppercase">Entrante</span>
                </div>
            </div>
        </div>

        <!-- Inputs Area -->
        <div class="grid grid-cols-2 gap-2">
            <div class="flex flex-col gap-1">
                <label class="text-[9px] font-bold text-slate-500 uppercase tracking-widest ml-1">Mi Canal</label>
                <input type="text" id="channel-name" value="ALPHA" 
                   class="bg-slate-900 border-2 border-slate-800 p-2 rounded-lg text-emerald-400 font-bold text-center focus:outline-none focus:border-emerald-600 text-xs uppercase font-['Orbitron']">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[9px] font-bold text-slate-500 uppercase tracking-widest ml-1">Destino</label>
                <div class="flex gap-1">
                    <input type="text" id="target-id" placeholder="ID" 
                       class="flex-1 bg-slate-900 border-2 border-slate-800 p-2 rounded-lg text-emerald-400 font-bold text-center focus:outline-none focus:border-emerald-600 text-xs font-['Orbitron']">
                    <button id="lock-id-btn" class="bg-slate-800 px-3 rounded-lg text-emerald-500 active:scale-95 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- PTT Button (Toggle Mode) -->
    <div class="w-full max-w-md flex flex-col items-center gap-6">
        <button id="ptt-btn" 
                class="ptt-btn w-44 h-44 rounded-full flex flex-col items-center justify-center group select-none outline-none relative z-10">
            <div class="absolute inset-0 rounded-full border border-white/5 pointer-events-none"></div>
            <svg xmlns="http://www.w3.org/2000/svg" class="w-14 h-14 text-slate-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
            </svg>
            <span id="ptt-status-text" class="text-slate-500 font-black text-[10px] tracking-[0.3em] uppercase">Encender</span>
        </button>
        
        <p class="text-[9px] text-slate-600 text-center font-bold uppercase tracking-widest leading-relaxed">
            MODO: <span class="text-emerald-500">TOGGLE FULL-DUPLEX</span>
        </p>
    </div>

    <audio id="remote-audio" autoplay></audio>

    <script type="module">
        const pttBtn = document.getElementById('ptt-btn');
        const statusLed = document.getElementById('status-led');
        const statusText = document.getElementById('status-text');
        const myIdDisplay = document.getElementById('my-id');
        const actionMsg = document.getElementById('action-msg');
        const targetInput = document.getElementById('target-id');
        const channelInput = document.getElementById('channel-name');
        const audioLevel = document.getElementById('audio-level');
        const dbValue = document.getElementById('db-value');
        const txLabel = document.getElementById('tx-label');
        const rxLabel = document.getElementById('rx-label');
        const lampMic = document.getElementById('lamp-mic');
        const lampRx = document.getElementById('lamp-rx-active');
        const lockBtn = document.getElementById('lock-id-btn');
        const peerListContainer = document.getElementById('peer-list');
        const remoteAudio = document.getElementById('remote-audio');
        const pttStatusLabel = document.getElementById('ptt-status-text');

        let peer = null;
        let localStream = null;
        let currentCall = null;
        let audioContext = null;
        let analyser = null;
        let animationFrame = null;
        let myId = "";
        let isTransmitting = false;

        // --- SONIDO ---
        function playTone(f, d) {
            try {
                if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const o = audioContext.createOscillator();
                const g = audioContext.createGain();
                o.frequency.setValueAtTime(f, audioContext.currentTime);
                g.gain.setValueAtTime(0.05, audioContext.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + d);
                o.connect(g); g.connect(audioContext.destination);
                o.start(); o.stop(audioContext.currentTime + d);
            } catch(e) {}
        }

        // --- VÚMETRO ---
        function startVumeter(stream, isLocal = true) {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(stream);
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 64;
            source.connect(analyser);
            const data = new Uint8Array(analyser.frequencyBinCount);
            if(isLocal) lampMic.classList.add('glow-orange');
            else lampRx.classList.add('glow-blue');

            const frame = () => {
                analyser.getByteFrequencyData(data);
                let sum = 0; data.forEach(v => sum += v);
                let level = Math.min(100, ((sum / data.length) / 128) * 100);
                audioLevel.style.width = level + "%";
                dbValue.innerText = level > 0 ? `${Math.round(level - 80)} dB` : "-∞ dB";
                animationFrame = requestAnimationFrame(frame);
            };
            frame();
        }

        function stopVumeter() {
            if (animationFrame) cancelAnimationFrame(animationFrame);
            audioLevel.style.width = "0%";
            dbValue.innerText = "-∞ dB";
            lampMic.classList.remove('glow-orange');
            lampRx.classList.remove('glow-blue');
        }

        // --- PRESENCIA FIREBASE ---
        async function updatePresence() {
            const { db, appId, serverTimestamp, setDoc, doc } = window.vlan;
            if(!myId) return;
            const channel = channelInput.value.toUpperCase() || 'ALPHA';
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'online_users', myId), {
                id: myId,
                channel: channel,
                timestamp: serverTimestamp()
            });
        }

        function listenToPeers() {
            const { db, appId, collection, onSnapshot } = window.vlan;
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'online_users');
            
            onSnapshot(colRef, (snapshot) => {
                peerListContainer.innerHTML = "";
                const currentChannel = channelInput.value.toUpperCase();
                let found = false;

                snapshot.forEach(doc => {
                    const data = doc.data();
                    if(data.id !== myId && data.channel === currentChannel) {
                        found = true;
                        const div = document.createElement('div');
                        div.className = "flex justify-between items-center bg-emerald-950/10 p-1 rounded border border-emerald-900/10 cursor-pointer hover:bg-emerald-900/40 transition-colors";
                        div.innerHTML = `<span>UNIT-${data.id}</span> <span class="text-[7px] bg-emerald-900 text-emerald-400 px-1 rounded">ON-LINE</span>`;
                        div.onclick = () => {
                            targetInput.value = data.id;
                            playTone(1200, 0.05);
                        };
                        peerListContainer.appendChild(div);
                    }
                });

                if(!found) {
                    peerListContainer.innerHTML = `<span class="opacity-20 italic">Canal ${currentChannel} vacío</span>`;
                }
            });
        }

        // --- PEERJS LOGIC ---
        function initPeer() {
            myId = Math.floor(1000 + Math.random() * 8999).toString();
            peer = new Peer(myId);

            peer.on('open', (id) => {
                myIdDisplay.innerText = id;
                statusLed.className = 'w-3 h-3 rounded-full status-glow glow-green';
                statusText.innerText = 'ONLINE / READY';
                actionMsg.innerText = 'CANAL EN ESPERA';
                updatePresence();
                listenToPeers();
            });

            peer.on('call', (call) => {
                // Auto-answer: si ya estamos transmitiendo, contestamos con nuestro stream. 
                // Si no, contestamos sin stream pero recibimos el de ellos.
                call.answer(isTransmitting ? localStream : null);
                
                call.on('stream', (stream) => {
                    remoteAudio.srcObject = stream;
                    actionMsg.innerText = 'RX: ENTRANTE';
                    rxLabel.classList.add('bg-blue-600', 'text-white');
                    statusLed.className = 'w-3 h-3 rounded-full status-glow glow-blue';
                    startVumeter(stream, false);
                });
                
                call.on('close', () => {
                    rxLabel.classList.remove('bg-blue-600', 'text-white');
                    if(!isTransmitting) {
                        actionMsg.innerText = 'CANAL EN ESPERA';
                        statusLed.className = 'w-3 h-3 rounded-full status-glow glow-green';
                        stopVumeter();
                    }
                });
            });
        }

        // --- TRANSMISSION TOGGLE ---
        async function startTalk() {
            const dest = targetInput.value.trim();
            if(!dest) {
                playTone(200, 0.2);
                return actionMsg.innerText = "ERROR: SIN ID";
            }
            try {
                playTone(880, 0.05);
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                currentCall = peer.call(dest, localStream);
                
                // Visuales
                isTransmitting = true;
                document.body.classList.add('transmitting');
                pttBtn.classList.add('on');
                pttStatusLabel.innerText = "Cortar";
                txLabel.classList.add('bg-red-600', 'text-white');
                actionMsg.innerText = "TX: TRANSMITIENDO";
                startVumeter(localStream, true);
            } catch(e) { 
                actionMsg.innerText = "ERROR MIC"; 
                isTransmitting = false;
            }
        }

        function stopTalk() {
            if(currentCall) currentCall.close();
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            
            playTone(600, 0.1);
            
            // Visuales
            isTransmitting = false;
            document.body.classList.remove('transmitting');
            pttBtn.classList.remove('on');
            pttStatusLabel.innerText = "Encender";
            txLabel.classList.remove('bg-red-600', 'text-white');
            actionMsg.innerText = "CANAL EN ESPERA";
            stopVumeter();
            statusLed.className = 'w-3 h-3 rounded-full status-glow glow-green';
        }

        // --- EVENTOS ---
        window.addEventListener('load', async () => {
            const { auth } = window.vlan;
            try {
                await signInAnonymously(auth);
                statusText.innerText = "AUTENTICADO";
                initPeer();
                const saved = localStorage.getItem('vlan_target');
                if(saved) targetInput.value = saved;
            } catch(e) { statusText.innerText = "ERROR AUTH"; }
        });

        lockBtn.onclick = () => {
            localStorage.setItem('vlan_target', targetInput.value);
            updatePresence();
            playTone(1200, 0.05);
        };

        // El botón ahora es Toggle
        pttBtn.onclick = () => {
            if(isTransmitting) stopTalk();
            else startTalk();
        };

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0];
        }, 1000);

        channelInput.onchange = updatePresence;
    </script>
</body>
</html>
