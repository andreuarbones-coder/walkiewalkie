<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Intercomunicador Dual P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap');
        
        :root {
            --bg-base: #18181b; /* Zinc 900 */
            --bg-surface: #27272a; /* Zinc 800 */
            --text-main: #e4e4e7; /* Zinc 200 */
            --text-muted: #a1a1aa; /* Zinc 400 */
            --pastel-green: #99f6e4; /* Teal 200 */
            --pastel-red: #fecdd3; /* Rose 200 */
            --pastel-blue: #bae6fd; /* Sky 200 */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            overflow: hidden;
            touch-action: none;
            transition: background-color 0.5s ease;
        }

        /* Estado de Transmisión Activa */
        body.transmitting {
            background-color: #2e1014;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .panel {
            background-color: var(--bg-surface);
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.4s ease;
        }

        /* Botón PTT Minimalista */
        .ptt-btn {
            background-color: var(--bg-surface);
            border: 2px solid #3f3f46;
            color: var(--text-main);
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .ptt-btn.on {
            background-color: #4c1d24;
            border-color: var(--pastel-red);
            color: var(--pastel-red);
            box-shadow: 0 0 40px rgba(254, 205, 211, 0.15);
            transform: scale(0.98);
        }

        /* Vúmetro Suave */
        .vu-bar {
            height: 100%;
            width: 0%;
            background-color: var(--pastel-green);
            border-radius: 999px;
            transition: width 0.05s ease-out;
            opacity: 0.8;
        }
        body.transmitting .vu-bar { background-color: var(--pastel-red); }

        /* Sliders personalizados */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
            width: 100%;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px; width: 16px;
            border-radius: 50%;
            background: var(--text-main);
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px;
            background: #3f3f46;
            border-radius: 2px;
        }

        /* Indicador de estado (Pastel) */
        .indicator { width: 6px; height: 6px; border-radius: 50%; transition: all 0.3s; }
        .ind-off { background-color: #52525b; }
        .ind-green { background-color: var(--pastel-green); box-shadow: 0 0 10px var(--pastel-green); }
        .ind-red { background-color: var(--pastel-red); box-shadow: 0 0 10px var(--pastel-red); }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center p-4">

    <!-- PANTALLA DE SELECCIÓN DE UNIDAD -->
    <div id="setup-screen" class="w-full max-w-sm panel p-8 flex flex-col gap-6 text-center">
        <h1 class="text-xl font-semibold tracking-wide text-zinc-100">Configuración Inicial</h1>
        <p class="text-sm text-zinc-400">Selecciona la identidad de este dispositivo. Solo funcionarán entre ellos.</p>
        
        <div class="flex flex-col gap-4 mt-4">
            <button onclick="initApp('unidad-a', 'unidad-b')" class="p-4 rounded-xl border border-zinc-600 hover:bg-zinc-700 active:scale-95 transition-all flex items-center justify-between">
                <span class="font-semibold text-teal-200">UNIDAD A</span>
                <span class="text-xs text-zinc-500">Conecta con B</span>
            </button>
            <button onclick="initApp('unidad-b', 'unidad-a')" class="p-4 rounded-xl border border-zinc-600 hover:bg-zinc-700 active:scale-95 transition-all flex items-center justify-between">
                <span class="font-semibold text-sky-200">UNIDAD B</span>
                <span class="text-xs text-zinc-500">Conecta con A</span>
            </button>
        </div>
    </div>

    <!-- PANTALLA PRINCIPAL DEL INTERCOMUNICADOR -->
    <div id="main-screen" class="w-full max-w-sm h-full flex flex-col justify-between hidden pb-6">
        
        <!-- Cabecera de Estado -->
        <div class="panel p-5 flex flex-col gap-4">
            <div class="flex justify-between items-center">
                <div class="flex flex-col">
                    <span class="text-xs text-zinc-500 font-semibold tracking-wider uppercase">Identidad</span>
                    <span id="ui-my-role" class="text-lg font-semibold tracking-wide text-teal-200">UNIDAD A</span>
                </div>
                <div class="flex flex-col items-end">
                    <span class="text-xs text-zinc-500 font-semibold tracking-wider uppercase">Enlace a</span>
                    <span id="ui-target-role" class="text-sm text-zinc-300">UNIDAD B</span>
                </div>
            </div>

            <!-- Monitor de Enlace (Heartbeat) -->
            <div class="bg-zinc-900/50 rounded-lg p-3 flex justify-between items-center border border-zinc-700/50">
                <div class="flex items-center gap-2">
                    <div id="link-indicator" class="indicator ind-off"></div>
                    <span id="link-status" class="text-xs font-semibold text-zinc-400">Buscando compañero...</span>
                </div>
                <span id="link-ping" class="text-xs mono text-zinc-500">-- ms</span>
            </div>
        </div>

        <!-- Área Central (Vúmetro y Controles secundarios) -->
        <div class="flex flex-col gap-6 px-2">
            
            <!-- Vúmetro -->
            <div class="flex flex-col gap-2">
                <div class="flex justify-between text-[10px] font-semibold text-zinc-500 uppercase tracking-widest px-1">
                    <span id="meter-label">Actividad de Audio</span>
                </div>
                <div class="h-2 w-full bg-zinc-800 rounded-full overflow-hidden">
                    <div id="vu-meter" class="vu-bar"></div>
                </div>
            </div>

            <!-- Control de Volumen -->
            <div class="flex items-center gap-4 bg-zinc-800/50 p-4 rounded-xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-zinc-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                </svg>
                <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="1" class="flex-1">
            </div>
        </div>

        <!-- Botón PTT Principal -->
        <div class="flex justify-center mb-4">
            <button id="ptt-btn" class="ptt-btn w-64 h-64 rounded-full flex flex-col items-center justify-center outline-none select-none">
                <svg id="ptt-icon" xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-4 opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
                <span id="ptt-text" class="text-xs tracking-[0.2em] font-semibold uppercase">Tocar para Hablar</span>
            </button>
        </div>
        
    </div>

    <audio id="remote-audio" autoplay></audio>

    <script>
        // Prefix secreto para evitar colisiones en la red pública de PeerJS
        const APP_PREFIX = "ar-vox-private-v1-"; 
        
        let myId, targetId;
        let peer = null;
        let localStream = null;
        let currentCall = null;
        let dataConnection = null;
        let isTransmitting = false;
        
        // Audio/Visual
        let audioCtx = null;
        let analyser = null;
        let animFrame = null;
        
        // Elementos DOM
        const setupScreen = document.getElementById('setup-screen');
        const mainScreen = document.getElementById('main-screen');
        const pttBtn = document.getElementById('ptt-btn');
        const pttText = document.getElementById('ptt-text');
        const linkIndicator = document.getElementById('link-indicator');
        const linkStatus = document.getElementById('link-status');
        const linkPing = document.getElementById('link-ping');
        const vuMeter = document.getElementById('vu-meter');
        const meterLabel = document.getElementById('meter-label');
        const remoteAudio = document.getElementById('remote-audio');
        const volSlider = document.getElementById('vol-slider');

        // WakeLock API para mantener pantalla encendida
        let wakeLock = null;
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    wakeLock.addEventListener('release', () => { console.log('Wake Lock liberado'); });
                } catch (err) { console.error('Wake Lock falló:', err); }
            }
        }

        // --- INICIALIZACIÓN ---
        function initApp(role, target) {
            myId = APP_PREFIX + role;
            targetId = APP_PREFIX + target;

            // Actualizar Textos UI
            document.getElementById('ui-my-role').innerText = role === 'unidad-a' ? 'UNIDAD A' : 'UNIDAD B';
            document.getElementById('ui-my-role').className = role === 'unidad-a' ? 'text-lg font-semibold tracking-wide text-teal-200' : 'text-lg font-semibold tracking-wide text-sky-200';
            document.getElementById('ui-target-role').innerText = target === 'unidad-a' ? 'UNIDAD A' : 'UNIDAD B';

            setupScreen.classList.add('hidden');
            mainScreen.classList.remove('hidden');

            // Requerir WakeLock (interacción del usuario acaba de ocurrir)
            requestWakeLock();
            
            // Inicializar AudioContext
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            setupPeer();
        }

        function setupPeer() {
            peer = new Peer(myId, { debug: 1 });

            peer.on('open', () => {
                connectDataChannel(); // Intentar conectar al otro lado silenciosamente
            });

            // Recibir canal de datos (El otro hace ping)
            peer.on('connection', (conn) => {
                dataConnection = conn;
                handleDataChannel(conn);
            });

            // Recibir llamada de voz
            peer.on('call', (call) => {
                call.answer(isTransmitting ? localStream : null);
                
                call.on('stream', (stream) => {
                    remoteAudio.srcObject = stream;
                    meterLabel.innerText = "Recibiendo...";
                    meterLabel.style.color = "var(--pastel-blue)";
                    startVumeter(stream);
                });

                call.on('close', () => {
                    if(!isTransmitting) stopVumeter();
                });
            });

            peer.on('error', (err) => {
                console.error("Peer error:", err);
                // Si el otro no está conectado aún, reintentaremos automáticamente
            });
        }

        // --- MONITOR DE ENLACE (HEARTBEAT/PING) ---
        let pingInterval;
        let lastPingTime;

        function connectDataChannel() {
            if(dataConnection && dataConnection.open) return;
            
            const conn = peer.connect(targetId, { reliable: false });
            
            conn.on('open', () => {
                dataConnection = conn;
                handleDataChannel(conn);
            });
            
            // Reintento silencioso si no conecta
            setTimeout(connectDataChannel, 3000); 
        }

        function handleDataChannel(conn) {
            linkIndicator.className = 'indicator ind-green';
            linkStatus.innerText = "Enlace Activo";
            linkStatus.style.color = "var(--pastel-green)";

            // Iniciar ciclo de pings
            clearInterval(pingInterval);
            pingInterval = setInterval(() => {
                if(conn.open) {
                    lastPingTime = Date.now();
                    conn.send({ type: 'ping' });
                } else {
                    linkLost();
                }
            }, 2000);

            conn.on('data', (data) => {
                if (data.type === 'ping') {
                    conn.send({ type: 'pong' }); // Responder al ping
                } else if (data.type === 'pong') {
                    const latency = Date.now() - lastPingTime;
                    linkPing.innerText = `${latency} ms`;
                }
            });

            conn.on('close', linkLost);
            conn.on('error', linkLost);
        }

        function linkLost() {
            clearInterval(pingInterval);
            dataConnection = null;
            linkIndicator.className = 'indicator ind-off';
            linkStatus.innerText = "Compañero Ausente";
            linkStatus.style.color = "var(--text-muted)";
            linkPing.innerText = "-- ms";
            // Intentar reconectar
            setTimeout(connectDataChannel, 3000);
        }

        // --- CONTROL DE VOZ Y VÚMETRO ---
        function startVumeter(stream) {
            if(animFrame) cancelAnimationFrame(animFrame);
            
            const source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 128;
            analyser.smoothingTimeConstant = 0.5;
            source.connect(analyser);
            
            const data = new Uint8Array(analyser.frequencyBinCount);
            
            const update = () => {
                analyser.getByteFrequencyData(data);
                let sum = 0; data.forEach(v => sum += v);
                let avg = sum / data.length;
                let level = Math.min(100, (avg / 128) * 100);
                vuMeter.style.width = level + "%";
                animFrame = requestAnimationFrame(update);
            };
            update();
        }

        function stopVumeter() {
            if(animFrame) cancelAnimationFrame(animFrame);
            vuMeter.style.width = "0%";
            meterLabel.innerText = "Actividad de Audio";
            meterLabel.style.color = "var(--text-muted)";
        }

        async function toggleTransmit() {
            if(isTransmitting) {
                // APAGAR TRANSMISIÓN
                isTransmitting = false;
                if(currentCall) currentCall.close();
                if(localStream) localStream.getTracks().forEach(t => t.stop());
                
                document.body.classList.remove('transmitting');
                pttBtn.classList.remove('on');
                pttText.innerText = "Tocar para Hablar";
                stopVumeter();
            } else {
                // INICIAR TRANSMISIÓN
                try {
                    // Reanudar contexto de audio (requerimiento navegadores)
                    if(audioCtx.state === 'suspended') audioCtx.resume();

                    localStream = await navigator.mediaDevices.getUserMedia({ 
                        audio: { echoCancellation: true, noiseSuppression: true } 
                    });
                    
                    currentCall = peer.call(targetId, localStream);
                    
                    isTransmitting = true;
                    document.body.classList.add('transmitting');
                    pttBtn.classList.add('on');
                    pttText.innerText = "Cortar Canal";
                    meterLabel.innerText = "Emitiendo...";
                    meterLabel.style.color = "var(--pastel-red)";
                    
                    startVumeter(localStream);

                } catch(e) {
                    console.error(e);
                    alert("No se pudo acceder al micrófono.");
                }
            }
        }

        // --- EVENTOS INTERFAZ ---
        pttBtn.addEventListener('click', toggleTransmit);
        
        volSlider.addEventListener('input', (e) => {
            remoteAudio.volume = e.target.value;
        });

        // Recuperar WakeLock si se minimiza y vuelve a maximizar la app
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && wakeLock !== null) {
                requestWakeLock();
            }
        });

    </script>
</body>
</html>
