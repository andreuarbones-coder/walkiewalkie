<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOX-LAN Tactical Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700&display=swap');
        
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #050505;
            color: #d1d5db;
            overflow: hidden;
            touch-action: none;
        }

        .lcd-display {
            background-color: #0a110f;
            border: 2px solid #162a24;
            box-shadow: inset 0 0 30px rgba(0, 255, 150, 0.05);
            position: relative;
        }

        .lcd-display::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }

        .ptt-btn {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            box-shadow: 0 10px 0 #020617, 0 20px 30px rgba(0,0,0,0.7);
            border: 4px solid #334155;
            transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .ptt-btn:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #020617, 0 5px 15px rgba(0,0,0,0.5);
            background: #064e3b;
            border-color: #10b981;
        }

        .ptt-btn.active-glow {
            animation: pulse-border 1.5s infinite;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 4px 0 #020617, 0 0 0px rgba(16, 185, 129, 0.2); }
            50% { box-shadow: 0 4px 0 #020617, 0 0 30px rgba(16, 185, 129, 0.6); }
            100% { box-shadow: 0 4px 0 #020617, 0 0 0px rgba(16, 185, 129, 0.2); }
        }

        .status-glow { transition: all 0.3s ease; }
        .glow-green { box-shadow: 0 0 15px #10b981; background-color: #10b981; }
        .glow-red { box-shadow: 0 0 15px #ef4444; background-color: #ef4444; }
        .glow-blue { box-shadow: 0 0 20px #3b82f6; background-color: #3b82f6; }

        .level-bar {
            height: 4px;
            background: #064e3b;
            transition: width 0.05s ease;
            width: 0%;
        }

        input::placeholder { color: #1e293b; }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-between p-6 pb-12">

    <!-- Header Status -->
    <div class="w-full max-w-md flex justify-between items-center opacity-80">
        <div class="flex items-center gap-3">
            <div id="status-led" class="w-3 h-3 rounded-full status-glow glow-red"></div>
            <span id="status-text" class="text-[10px] font-bold tracking-[0.2em] uppercase">Offline</span>
        </div>
        <div class="flex gap-4">
            <span id="tx-label" class="text-[9px] font-black text-slate-800 border border-slate-800 px-1 rounded transition-colors">TX</span>
            <span id="rx-label" class="text-[9px] font-black text-slate-800 border border-slate-800 px-1 rounded transition-colors">RX</span>
        </div>
    </div>

    <!-- Main Console -->
    <div class="w-full max-w-md flex flex-col gap-6">
        
        <!-- LCD Display -->
        <div class="lcd-display rounded-xl p-5 border-t-4 border-slate-800">
            <div class="flex justify-between items-start mb-2">
                <div class="text-[10px] text-emerald-500/50 font-bold uppercase tracking-widest">ID de Unidad</div>
                <div class="text-[10px] text-emerald-500/50 font-bold uppercase tracking-widest" id="clock">00:00:00</div>
            </div>
            
            <div class="flex flex-col items-center justify-center py-2">
                <div id="my-id" class="text-4xl font-bold text-emerald-400 tracking-tighter font-['Orbitron'] mb-1">----</div>
                <div id="action-msg" class="text-[10px] h-4 text-emerald-600 font-bold uppercase tracking-wider">Esperando Red...</div>
            </div>

            <!-- Vúmetro / Nivel de Audio -->
            <div class="w-full bg-slate-900/50 rounded overflow-hidden mt-4 border border-emerald-900/10">
                <div id="audio-level" class="level-bar shadow-[0_0_10px_#10b981]"></div>
            </div>

            <div class="grid grid-cols-2 gap-4 mt-4 pt-4 border-t border-emerald-900/20">
                <div>
                    <span class="text-[9px] block text-emerald-700 font-bold uppercase">Estado Mic</span>
                    <span id="mic-status" class="text-[11px] text-emerald-500 font-bold">MUTED</span>
                </div>
                <div class="text-right">
                    <span class="text-[9px] block text-emerald-700 font-bold uppercase">Latencia</span>
                    <span class="text-[11px] text-emerald-500 font-bold font-mono">~20ms PEER</span>
                </div>
            </div>
        </div>

        <!-- Target Input -->
        <div class="space-y-2">
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">ID del Receptor</label>
            <div class="relative">
                <input type="text" id="target-id" placeholder="INGRESE ID DESTINO" 
                   class="w-full bg-slate-900 border-2 border-slate-800 p-4 rounded-xl text-emerald-400 font-bold text-center focus:outline-none focus:border-emerald-600 transition-all tracking-[0.3em] font-['Orbitron']">
                <div class="absolute right-4 top-1/2 -translate-y-1/2 w-2 h-2 rounded-full bg-emerald-900/30"></div>
            </div>
        </div>
    </div>

    <!-- PTT Button Section -->
    <div class="w-full max-w-md flex flex-col items-center gap-6">
        <div class="relative">
            <!-- Ripple Effect Container -->
            <div id="ptt-container" class="absolute inset-0 rounded-full scale-110 opacity-0 transition-opacity"></div>
            
            <button id="ptt-btn" 
                    class="ptt-btn w-44 h-44 rounded-full flex flex-col items-center justify-center group select-none outline-none relative z-10">
                <div class="absolute inset-0 rounded-full border border-white/5 pointer-events-none"></div>
                <svg xmlns="http://www.w3.org/2000/svg" class="w-14 h-14 text-slate-500 group-active:text-emerald-400 mb-2 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
                <span class="text-slate-500 group-active:text-emerald-400 font-black text-[10px] tracking-[0.3em] uppercase">Transmitir</span>
            </button>
        </div>
        
        <p class="text-[10px] text-slate-600 text-center font-bold uppercase tracking-widest leading-relaxed max-w-[200px]">
            PRESIONE PARA EMITIR<br>SUELTE PARA RECIBIR
        </p>
    </div>

    <audio id="remote-audio" autoplay></audio>

    <script>
        const pttBtn = document.getElementById('ptt-btn');
        const statusLed = document.getElementById('status-led');
        const statusText = document.getElementById('status-text');
        const myIdDisplay = document.getElementById('my-id');
        const actionMsg = document.getElementById('action-msg');
        const targetInput = document.getElementById('target-id');
        const audioLevel = document.getElementById('audio-level');
        const micStatus = document.getElementById('mic-status');
        const txLabel = document.getElementById('tx-label');
        const rxLabel = document.getElementById('rx-label');
        const remoteAudio = document.getElementById('remote-audio');

        let peer = null;
        let localStream = null;
        let currentCall = null;
        let audioContext = null;
        let analyser = null;
        let animationFrame = null;

        // --- SISTEMA DE SONIDO (BEEPS) ---
        function playSystemTone(freq, duration, type = 'sine') {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioContext.currentTime);
            
            gain.gain.setValueAtTime(0.1, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioContext.destination);
            
            osc.start();
            osc.stop(audioContext.currentTime + duration);
        }

        // --- VISUALIZADOR DE NIVEL ---
        function startLevelMeter(stream) {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(stream);
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);
            
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            function update() {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                let average = sum / dataArray.length;
                let level = Math.min(100, (average / 128) * 100);
                audioLevel.style.width = level + "%";
                animationFrame = requestAnimationFrame(update);
            }
            update();
        }

        function stopLevelMeter() {
            if (animationFrame) cancelAnimationFrame(animationFrame);
            audioLevel.style.width = "0%";
        }

        // --- LÓGICA DE PEERJS ---
        function init() {
            const randomId = Math.floor(1000 + Math.random() * 8999).toString();
            peer = new Peer(randomId);

            peer.on('open', (id) => {
                myIdDisplay.innerText = id;
                statusLed.className = 'w-3 h-3 rounded-full status-glow glow-green';
                statusText.innerText = 'Online / Ready';
                actionMsg.innerText = 'Sistema en reposo';
            });

            peer.on('call', (call) => {
                call.answer();
                call.on('stream', (stream) => {
                    remoteAudio.srcObject = stream;
                    
                    // Feedback RX
                    actionMsg.innerText = 'RECIBIENDO AUDIO...';
                    rxLabel.classList.add('bg-blue-600', 'text-white', 'border-blue-400');
                    statusLed.className = 'w-3 h-3 rounded-full status-glow glow-blue';
                    startLevelMeter(stream);
                });
                call.on('close', () => {
                    rxLabel.classList.remove('bg-blue-600', 'text-white', 'border-blue-400');
                    resetUI();
                });
            });

            peer.on('error', (err) => {
                statusText.innerText = 'Error de Enlace';
                statusLed.className = 'w-3 h-3 rounded-full status-glow glow-red';
            });
        }

        function resetUI() {
            actionMsg.innerText = 'Sistema en reposo';
            statusLed.className = 'w-3 h-3 rounded-full status-glow glow-green';
            stopLevelMeter();
        }

        async function startTalk() {
            const dest = targetInput.value.trim();
            if (!dest) {
                actionMsg.innerText = 'ERROR: SIN DESTINO';
                playSystemTone(150, 0.1, 'square');
                return;
            }

            try {
                // Tono de apertura
                playSystemTone(880, 0.05);
                setTimeout(() => playSystemTone(1100, 0.08), 50);

                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true } 
                });
                
                currentCall = peer.call(dest, localStream);
                
                // UI Feedback TX
                pttBtn.classList.add('active-glow');
                txLabel.classList.add('bg-emerald-600', 'text-white', 'border-emerald-400');
                actionMsg.innerText = 'TRANSMITIENDO...';
                micStatus.innerText = 'ACTIVE';
                statusLed.className = 'w-3 h-3 rounded-full status-glow glow-blue';
                startLevelMeter(localStream);

            } catch (err) {
                console.error(err);
                actionMsg.innerText = 'ERROR MICRO';
            }
        }

        function stopTalk() {
            if (currentCall) currentCall.close();
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            
            // Tono de cierre
            playSystemTone(600, 0.1);

            // Reset UI
            pttBtn.classList.remove('active-glow');
            txLabel.classList.remove('bg-emerald-600', 'text-white', 'border-emerald-400');
            micStatus.innerText = 'MUTED';
            resetUI();
        }

        // Reloj
        setInterval(() => {
            const d = new Date();
            document.getElementById('clock').innerText = d.toTimeString().split(' ')[0];
        }, 1000);

        // Eventos
        pttBtn.addEventListener('mousedown', startTalk);
        pttBtn.addEventListener('mouseup', stopTalk);
        pttBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startTalk(); });
        pttBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopTalk(); });

        init();
    </script>
</body>
</html>
