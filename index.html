<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Intercomunicador Dual P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --bg-base: #18181b; /* Zinc 900 */
            --bg-surface: #27272a; /* Zinc 800 */
            --text-main: #e4e4e7; /* Zinc 200 */
            --text-muted: #a1a1aa; /* Zinc 400 */
            --pastel-green: #99f6e4; /* Teal 200 */
            --pastel-red: #fecdd3; /* Rose 200 */
            --pastel-blue: #bae6fd; /* Sky 200 */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            overflow: hidden;
            touch-action: none;
            transition: background-color 0.5s ease;
        }

        /* Estado de Transmisión Activa */
        body.transmitting { background-color: #2e1014; }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .panel {
            background-color: var(--bg-surface);
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.4s ease;
        }

        /* Botón PTT */
        .ptt-btn {
            background-color: var(--bg-surface);
            border: 2px solid #3f3f46;
            color: var(--text-main);
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .ptt-btn.on {
            background-color: #4c1d24;
            border-color: var(--pastel-red);
            color: var(--pastel-red);
            box-shadow: 0 0 40px rgba(254, 205, 211, 0.15);
            transform: scale(0.98);
        }

        /* Vúmetro */
        .vu-bar {
            height: 100%; width: 0%;
            background-color: var(--pastel-green);
            border-radius: 999px;
            transition: width 0.05s ease-out;
            opacity: 0.8;
        }
        body.transmitting .vu-bar { background-color: var(--pastel-red); }

        /* Sliders */
        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: var(--text-main); margin-top: -6px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: #3f3f46; border-radius: 2px; }

        /* Indicador de estado */
        .indicator { width: 6px; height: 6px; border-radius: 50%; transition: all 0.3s; }
        .ind-off { background-color: #52525b; }
        .ind-green { background-color: var(--pastel-green); box-shadow: 0 0 10px var(--pastel-green); }
        .ind-red { background-color: var(--pastel-red); box-shadow: 0 0 10px var(--pastel-red); }

        .hidden-screen { display: none !important; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center p-4">

    <!-- REPRODUCTOR SILENCIOSO PARA BACKGROUND MODE -->
    <!-- Un archivo WAV en base64 de 1 segundo de silencio total -->
    <audio id="silent-audio" loop playsinline>
        <source src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA" type="audio/wav">
    </audio>

    <!-- PANTALLA DE VINCULACIÓN (PAIRING) -->
    <div id="setup-screen" class="w-full max-w-sm panel p-8 flex flex-col gap-6 text-center hidden-screen">
        <div class="flex flex-col gap-2">
            <h1 class="text-xl font-semibold tracking-wide text-zinc-100">Vinculación de Radio</h1>
            <p class="text-xs text-zinc-400">Comparte tu código con tu compañero o introduce el suyo para conectar ambos dispositivos de forma segura.</p>
        </div>
        
        <div class="bg-zinc-900/50 p-4 rounded-xl border border-zinc-700/50">
            <span class="text-[10px] text-zinc-500 font-semibold uppercase tracking-widest block mb-1">Tu Código (ID Local)</span>
            <span id="display-my-id" class="text-3xl font-bold mono text-teal-200 tracking-[0.2em]">----</span>
        </div>

        <div class="flex flex-col gap-2 text-left">
            <label class="text-[10px] text-zinc-500 font-semibold uppercase tracking-widest pl-1">Código del Compañero</label>
            <input type="text" id="input-partner-id" placeholder="Ej. 8492" maxlength="8"
                   class="w-full bg-zinc-900 border-2 border-zinc-700 p-4 rounded-xl text-zinc-200 font-bold text-center focus:outline-none focus:border-teal-500 transition-all tracking-[0.3em] mono text-xl">
        </div>

        <button onclick="pairDevices()" class="mt-2 w-full bg-teal-800/40 text-teal-200 border border-teal-700/50 hover:bg-teal-700/50 font-bold p-4 rounded-xl transition-all active:scale-95">
            VINCULAR Y ENTRAR
        </button>
    </div>

    <!-- PANTALLA PRINCIPAL DEL INTERCOMUNICADOR -->
    <div id="main-screen" class="w-full max-w-sm h-full flex flex-col justify-between hidden-screen pb-6">
        
        <!-- Cabecera de Estado -->
        <div class="panel p-5 flex flex-col gap-4">
            <div class="flex justify-between items-start">
                <div class="flex flex-col">
                    <span class="text-[9px] text-zinc-500 font-semibold tracking-wider uppercase">Local</span>
                    <span id="ui-my-role" class="text-sm font-semibold tracking-wide mono text-zinc-300">ID: ----</span>
                </div>
                <div class="flex flex-col items-end">
                    <span class="text-[9px] text-zinc-500 font-semibold tracking-wider uppercase">Destino</span>
                    <span id="ui-target-role" class="text-sm font-semibold tracking-wide mono text-teal-200">ID: ----</span>
                </div>
            </div>

            <!-- Monitor de Enlace (Heartbeat) -->
            <div class="bg-zinc-900/50 rounded-lg p-3 flex justify-between items-center border border-zinc-700/50">
                <div class="flex items-center gap-2">
                    <div id="link-indicator" class="indicator ind-off"></div>
                    <span id="link-status" class="text-xs font-semibold text-zinc-400">Buscando enlace...</span>
                </div>
                <span id="link-ping" class="text-[10px] mono text-zinc-500">-- ms</span>
            </div>

            <div class="flex justify-between items-center px-1">
                <span class="text-[9px] font-semibold text-teal-500/70 flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 2a8 8 0 100 16 8 8 0 000-16zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                    </svg>
                    Fondo Activo
                </span>
                <button onclick="unpair()" class="text-[9px] font-semibold text-zinc-500 hover:text-zinc-300 underline uppercase tracking-wider">
                    Desvincular
                </button>
            </div>
        </div>

        <!-- Área Central (Vúmetro y Controles secundarios) -->
        <div class="flex flex-col gap-6 px-2">
            
            <!-- Vúmetro -->
            <div class="flex flex-col gap-2">
                <div class="flex justify-between text-[10px] font-semibold text-zinc-500 uppercase tracking-widest px-1">
                    <span id="meter-label">Actividad de Audio</span>
                </div>
                <div class="h-2 w-full bg-zinc-800 rounded-full overflow-hidden">
                    <div id="vu-meter" class="vu-bar"></div>
                </div>
            </div>

            <!-- Control de Volumen -->
            <div class="flex items-center gap-4 bg-zinc-800/50 p-4 rounded-xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-zinc-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                </svg>
                <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="1" class="flex-1">
            </div>
        </div>

        <!-- Botón PTT Principal -->
        <div class="flex justify-center mb-4">
            <button id="ptt-btn" class="ptt-btn w-64 h-64 rounded-full flex flex-col items-center justify-center outline-none select-none">
                <svg id="ptt-icon" xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-4 opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
                <span id="ptt-text" class="text-xs tracking-[0.2em] font-semibold uppercase">Hablar (Toggle)</span>
            </button>
        </div>
        
    </div>

    <!-- Elemento de audio para recibir la voz del compañero -->
    <audio id="remote-audio" autoplay></audio>

    <script>
        // Prefix secreto para aislar nuestras conexiones en PeerJS
        const APP_PREFIX = "ar-vox-v2-"; 
        
        let myId, targetId;
        let peer = null;
        let localStream = null;
        let currentCall = null;
        let dataConnection = null;
        let isTransmitting = false;
        
        // Audio/Visual
        let audioCtx = null;
        let analyser = null;
        let animFrame = null;
        
        // Elementos DOM
        const setupScreen = document.getElementById('setup-screen');
        const mainScreen = document.getElementById('main-screen');
        const displayMyId = document.getElementById('display-my-id');
        const inputPartnerId = document.getElementById('input-partner-id');
        const pttBtn = document.getElementById('ptt-btn');
        const pttText = document.getElementById('ptt-text');
        const linkIndicator = document.getElementById('link-indicator');
        const linkStatus = document.getElementById('link-status');
        const linkPing = document.getElementById('link-ping');
        const vuMeter = document.getElementById('vu-meter');
        const meterLabel = document.getElementById('meter-label');
        const remoteAudio = document.getElementById('remote-audio');
        const silentAudio = document.getElementById('silent-audio');
        const volSlider = document.getElementById('vol-slider');

        // WakeLock API (Mantener pantalla activa si se deja abierta)
        let wakeLock = null;
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                } catch (err) { 
                    // No registrar error si el entorno no lo permite, es opcional.
                }
            }
        }

        // Truco para habilitar el audio de fondo en móviles (Background Mode)
        function enableBackgroundAudio() {
            // Reproducir un sonido en blanco en bucle obliga al OS a mantener el proceso de audio vivo
            silentAudio.play().catch(e => console.log("Silent audio autoplay blocked, waiting for interaction."));
            
            // Configurar MediaSession para que aparezca en la pantalla de bloqueo
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: 'Intercomunicador Activo',
                    artist: 'VOX-LAN Escuchando',
                    album: 'Radio P2P'
                });
                
                // Mapear los botones físicos de los auriculares (opcional)
                navigator.mediaSession.setActionHandler('play', function() { /* Ignorar, siempre activo */ });
                navigator.mediaSession.setActionHandler('pause', function() { /* Ignorar, no pausar */ });
            }
        }

        // --- GESTIÓN DE ESTADOS Y MEMORIA ---
        function boot() {
            // Generar o cargar mi ID (Código de 4 dígitos)
            let storedMyId = localStorage.getItem('vox_my_id');
            if (!storedMyId) {
                storedMyId = Math.floor(1000 + Math.random() * 9000).toString();
                localStorage.setItem('vox_my_id', storedMyId);
            }
            myId = storedMyId;
            displayMyId.innerText = myId;

            // Verificar si ya tengo un compañero guardado
            let storedPartnerId = localStorage.getItem('vox_partner_id');
            if (storedPartnerId) {
                targetId = storedPartnerId;
                startMainApp();
            } else {
                // Mostrar pantalla de vinculación
                setupScreen.classList.remove('hidden-screen');
            }
        }

        function pairDevices() {
            const val = inputPartnerId.value.trim();
            if (val.length < 4) {
                alert("Introduce un código de compañero válido.");
                return;
            }
            if (val === myId) {
                alert("No puedes usar tu propio código.");
                return;
            }
            
            targetId = val;
            localStorage.setItem('vox_partner_id', targetId);
            
            setupScreen.classList.add('hidden-screen');
            startMainApp();
        }

        function unpair() {
            // Detener todo
            if (isTransmitting) toggleTransmit();
            if (dataConnection) dataConnection.close();
            if (peer) peer.destroy();
            clearInterval(pingInterval);
            
            // Borrar de memoria
            localStorage.removeItem('vox_partner_id');
            targetId = null;
            inputPartnerId.value = '';
            
            // Cambiar pantallas
            mainScreen.classList.add('hidden-screen');
            setupScreen.classList.remove('hidden-screen');
        }

        // --- LÓGICA PRINCIPAL DEL INTERCOMUNICADOR ---
        function startMainApp() {
            document.getElementById('ui-my-role').innerText = `ID: ${myId}`;
            document.getElementById('ui-target-role').innerText = `ID: ${targetId}`;
            mainScreen.classList.remove('hidden-screen');

            // Habilitar trucos para que funcione con pantalla apagada
            enableBackgroundAudio();
            requestWakeLock();
            
            // Iniciar Audio Web API
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            setupPeer();
        }

        function setupPeer() {
            peer = new Peer(APP_PREFIX + myId, { debug: 0 });

            peer.on('open', () => {
                connectDataChannel(); // Intentar conectar al otro lado silenciosamente
            });

            // Recibir canal de datos (El otro hace ping)
            peer.on('connection', (conn) => {
                dataConnection = conn;
                handleDataChannel(conn);
            });

            // Recibir llamada de voz (El otro presiona PTT)
            peer.on('call', (call) => {
                // Asegurar que el audio background está activo (por si el SO lo durmió)
                silentAudio.play().catch(()=>{});
                
                // Contestar (con o sin nuestro propio audio dependiendo de si estamos hablando)
                call.answer(isTransmitting ? localStream : null);
                
                call.on('stream', (stream) => {
                    remoteAudio.srcObject = stream;
                    
                    // Forzar play programáticamente ayuda en móviles
                    remoteAudio.play().catch(()=>{});

                    meterLabel.innerText = "Recibiendo audio...";
                    meterLabel.style.color = "var(--pastel-blue)";
                    startVumeter(stream);
                });

                call.on('close', () => {
                    if(!isTransmitting) stopVumeter();
                });
            });

            peer.on('error', (err) => {
                if (err.type === 'peer-unavailable') {
                    // Ignorar silenciosamente, el compañero simplemente no tiene la app abierta.
                    return;
                }
            });
        }

        // --- MONITOR DE ENLACE (PINGS) ---
        let pingInterval;
        let lastPingTime;

        function connectDataChannel() {
            if(!peer || peer.destroyed) return;
            if(dataConnection && dataConnection.open) return;
            
            const conn = peer.connect(APP_PREFIX + targetId, { reliable: false });
            
            conn.on('open', () => {
                dataConnection = conn;
                handleDataChannel(conn);
            });
            
            // Reintento silencioso cada 4 segundos
            setTimeout(connectDataChannel, 4000); 
        }

        function handleDataChannel(conn) {
            linkIndicator.className = 'indicator ind-green';
            linkStatus.innerText = "Enlace Activo";
            linkStatus.style.color = "var(--pastel-green)";

            clearInterval(pingInterval);
            pingInterval = setInterval(() => {
                if(conn.open) {
                    lastPingTime = Date.now();
                    conn.send({ type: 'ping' });
                } else {
                    linkLost();
                }
            }, 2500);

            conn.on('data', (data) => {
                if (data.type === 'ping') {
                    conn.send({ type: 'pong' }); 
                } else if (data.type === 'pong') {
                    const latency = Date.now() - lastPingTime;
                    linkPing.innerText = `${latency} ms`;
                }
            });

            conn.on('close', linkLost);
            conn.on('error', linkLost);
        }

        function linkLost() {
            clearInterval(pingInterval);
            dataConnection = null;
            linkIndicator.className = 'indicator ind-off';
            linkStatus.innerText = "Compañero Ausente";
            linkStatus.style.color = "var(--text-muted)";
            linkPing.innerText = "-- ms";
            setTimeout(connectDataChannel, 4000);
        }

        // --- VÚMETRO ---
        function startVumeter(stream) {
            if(animFrame) cancelAnimationFrame(animFrame);
            
            // Crear nuevo contexto si es necesario
            if (!audioCtx || audioCtx.state === 'closed') {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            const source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 128;
            analyser.smoothingTimeConstant = 0.4;
            source.connect(analyser);
            
            const data = new Uint8Array(analyser.frequencyBinCount);
            
            const update = () => {
                analyser.getByteFrequencyData(data);
                let sum = 0; data.forEach(v => sum += v);
                let avg = sum / data.length;
                let level = Math.min(100, (avg / 128) * 100);
                vuMeter.style.width = level + "%";
                animFrame = requestAnimationFrame(update);
            };
            update();
        }

        function stopVumeter() {
            if(animFrame) cancelAnimationFrame(animFrame);
            vuMeter.style.width = "0%";
            meterLabel.innerText = "Actividad de Audio";
            meterLabel.style.color = "var(--text-muted)";
        }

        // --- BOTÓN PTT TOGGLE ---
        async function toggleTransmit() {
            // Asegurar que las interacciones activen el contexto de audio y el audio silencioso
            if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            silentAudio.play().catch(()=>{});

            if(isTransmitting) {
                // APAGAR
                isTransmitting = false;
                if(currentCall) currentCall.close();
                if(localStream) localStream.getTracks().forEach(t => t.stop());
                
                document.body.classList.remove('transmitting');
                pttBtn.classList.remove('on');
                pttText.innerText = "Hablar (Toggle)";
                stopVumeter();
            } else {
                // ENCENDER
                if (!dataConnection || !dataConnection.open) {
                    // Advertencia amistosa, aunque dejaremos transmitir igual por si el ping se retrasó
                    console.log("Aviso: Transmitiendo sin confirmación de enlace de datos.");
                }

                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ 
                        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
                    });
                    
                    currentCall = peer.call(APP_PREFIX + targetId, localStream);
                    
                    isTransmitting = true;
                    document.body.classList.add('transmitting');
                    pttBtn.classList.add('on');
                    pttText.innerText = "Cortar Emisión";
                    meterLabel.innerText = "Emitiendo...";
                    meterLabel.style.color = "var(--pastel-red)";
                    
                    startVumeter(localStream);

                } catch(e) {
                    console.error("Error acceso mic:", e);
                    alert("Acepta el permiso del micrófono para hablar.");
                }
            }
        }

        // --- EVENTOS DEL DOM ---
        pttBtn.addEventListener('click', toggleTransmit);
        
        volSlider.addEventListener('input', (e) => {
            remoteAudio.volume = e.target.value;
        });

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && wakeLock !== null) {
                requestWakeLock();
            }
        });

        // Arrancar la lógica inicial al cargar la ventana
        window.onload = boot;

    </script>
</body>
</html>
